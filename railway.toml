[build]
builder = "RAILPACK"
# cache-bust: p2a discovery filter fix — force clean rebuild
buildCommand = "bun install --frozen-lockfile && bun run build"

[deploy]
startCommand = "bun run start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ---------------------------------------------------------------------------
# Cron — process wallet_collection_jobs every minute
#
# FIX (audit P2-A-CRON-01): /api/process-jobs was never being called
# automatically. Jobs discovered by TokenDiscovery were inserted as "pending"
# but nothing picked them up — they stalled forever.
#
# This cron fires every minute and processes up to 5 pending/stuck jobs per run.
# Authentication: set CRON_SECRET in Railway → Variables.
# ---------------------------------------------------------------------------
[[deploy.cronJobs]]
name    = "process-wallet-jobs"
schedule = "* * * * *"
command = "curl -s -X POST https://solana-scanner-production-e838.up.railway.app/api/process-jobs -H \"x-cron-secret: $CRON_SECRET\" || true"
